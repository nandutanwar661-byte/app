<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallingApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --wa-header-bg: #005c97;
            --wa-accent-blue: #34B7F1;
            --wa-message-out-bg: #e1f6fb;
            --wa-message-in-bg: #ffffff;
            --wa-app-bg: #f0f2f5;
            --wa-text-dark: #3b3b3b;
            --wa-text-light: #ffffff;
            --wa-text-muted: #667781;
            --wa-border: #e9edef;
            --wa-success: #25D366;
            --wa-danger: #ea0038;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #dadbd4;
            color: var(--wa-text-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--wa-app-bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            #app-container {
                height: 85vh;
                border-radius: 10px;
            }
        }

        /* Utility Classes for Views */
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--wa-app-bg);
            z-index: 10;
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }

        .view.active {
            transform: translateX(0);
        }

        /* --- AUTH VIEW --- */
        #auth-view {
            transform: translateX(0); /* Default initial view */
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--wa-header-bg) 0%, #003b64 100%);
            color: white;
            z-index: 20;
        }

        #auth-view.hidden {
            display: none !important;
        }

        .auth-card {
            background: white;
            padding: 30px 24px;
            border-radius: 8px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: var(--wa-text-dark);
        }

        .auth-card h1 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--wa-header-bg);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--wa-header-bg);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--wa-header-bg);
            cursor: pointer;
        }

        .error-msg {
            color: var(--wa-danger);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        /* --- MAIN VIEW & HEADER --- */
        .main-header {
            background-color: var(--wa-header-bg);
            color: white;
            padding: 14px 16px 0 16px;
            flex-shrink: 0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .top-bar h1 {
            font-size: 20px;
            font-weight: 500;
        }

        .icon-actions button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            margin-left: 15px;
            cursor: pointer;
        }

        .nav-tabs {
            display: flex;
            text-align: center;
        }

        .tab {
            flex: 1;
            padding: 12px 0;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            position: relative;
            border-bottom: 3px solid transparent;
        }

        .tab.active-tab {
            color: white;
            border-bottom-color: white;
        }

        .badge {
            background-color: var(--wa-accent-blue);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            position: absolute;
            top: 4px;
            right: 10px;
            display: none;
        }

        #main-content {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        .content-panel {
            width: 100%;
            height: 100%;
            position: absolute;
            top:0; left:0;
            overflow-y: auto;
            display: none;
            background: white;
        }

        .content-panel.active-panel {
            display: block;
        }

        /* --- LISTS UI --- */
        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--wa-border);
            cursor: pointer;
        }

        .list-item:hover {
            background-color: #f5f6f6;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .item-details {
            flex-grow: 1;
            overflow: hidden;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .item-name {
            font-weight: 500;
            font-size: 16px;
        }

        .item-time {
            font-size: 12px;
            color: var(--wa-text-muted);
        }

        .item-subtext {
            font-size: 14px;
            color: var(--wa-text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- CHAT VIEW --- */
        #chat-view {
            z-index: 15;
        }

        .chat-header {
            background-color: var(--wa-header-bg);
            color: white;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .chat-header .avatar {
            width: 36px;
            height: 36px;
            margin-right: 10px;
        }

        .chat-user-info {
            flex-grow: 1;
        }

        .chat-user-info h2 {
            font-size: 16px;
            font-weight: 500;
        }

        .chat-actions button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            margin-left: 18px;
            cursor: pointer;
        }

        .messages-container {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #efeae2;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            background-color: var(--wa-message-out-bg);
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .message.received {
            background-color: var(--wa-message-in-bg);
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .msg-time {
            font-size: 10px;
            color: var(--wa-text-muted);
            text-align: right;
            margin-top: 4px;
            display: block;
        }

        .chat-footer {
            padding: 10px;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-footer input {
            flex-grow: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            background: white;
        }

        .chat-footer button {
            background: var(--wa-header-bg);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* --- MODALS --- */
        .modal {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 30;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary { background: var(--wa-header-bg); color: white;}
        .btn-secondary { background: #ccc; color: var(--wa-text-dark);}
        .btn-danger { background: var(--wa-danger); color: white;}

        /* --- CALL SCREEN & WEBRTC VIDEO --- */
        #call-screen {
            background-color: #111;
            color: white;
            z-index: 40;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            position: absolute;
            top:0; left:0; width:100%; height:100%;
        }

        .call-user-details {
            text-align: center;
            margin-top: 40px;
        }

        .call-user-details h2 { margin-top: 15px; font-size: 24px;}
        .call-status { color: var(--wa-accent-blue); margin-top: 5px; font-size: 16px;}

        .video-container {
            width: 100%;
            flex-grow: 1;
            position: relative;
            margin: 20px 0;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            display: none; /* Shown dynamically during active video call */
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #local-video {
            width: 30%;
            height: 30%;
            position: absolute;
            bottom: 10px;
            right: 10px;
            object-fit: cover;
            border: 2px solid white;
            border-radius: 4px;
            background: #333;
        }

        .call-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            z-index: 50;
        }

        .call-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .call-btn.accept { background-color: var(--wa-success); }
        .call-btn.decline { background-color: var(--wa-danger); }
        .call-btn.mute { background-color: #555; }
    </style>
</head>
<body>

    <div id="app-container">

        <div id="auth-view">
            <div id="login-card" class="auth-card">
                <h1>CallingApp</h1>
                <form id="login-form" onsubmit="handleAuth(event, 'login')">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required autocomplete="email">
                        <div id="login-error" class="error-msg"></div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                </form>
                <div class="auth-toggle-link" onclick="toggleAuthForms(true)">Don't have an account? Sign Up</div>
            </div>

            <div id="signup-card" class="auth-card" style="display: none;">
                <h1>CallingApp</h1>
                <form id="signup-form" onsubmit="handleAuth(event, 'signup')">
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="signup-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" required autocomplete="email">
                        <div id="signup-error" class="error-msg"></div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="auth-btn">Sign Up</button>
                </form>
                <div class="auth-toggle-link" onclick="toggleAuthForms(false)">Already have an account? Login</div>
            </div>
        </div>

        <div id="main-view" class="view">
            <header class="main-header">
                <div class="top-bar">
                    <h1>CallingApp</h1>
                    <div class="icon-actions">
                        <button id="add-friend-btn" onclick="openModal('add-friend-modal')"><i class="fa-solid fa-user-plus"></i></button>
                        <button id="menu-btn" onclick="openModal('settings-modal')"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                </div>
                <div class="nav-tabs">
                    <div id="nav-home" class="tab active-tab" onclick="switchTab('home')">Chats<span class="badge" id="chat-badge">0</span></div>
                    <div id="nav-notifications" class="tab" onclick="switchTab('notifications')">Updates<span class="badge" id="notif-badge">0</span></div>
                    <div id="nav-calls" class="tab" onclick="switchTab('calls')">Calls<span class="badge" id="call-badge">0</span></div>
                </div>
            </header>

            <main id="main-content">
                <div id="home-content" class="content-panel active-panel"></div>
                <div id="notifications-content" class="content-panel"></div>
                <div id="calls-content" class="content-panel"></div>
            </main>
        </div>

        <div id="chat-view" class="view">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></button>
                <div id="chat-avatar" class="avatar">U</div>
                <div class="chat-user-info">
                    <h2 id="chat-screen-title">User</h2>
                </div>
                <div class="chat-actions">
                    <button onclick="initiateCall('voice')"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="initiateCall('video')"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
            <div id="messages-container" class="messages-container"></div>
            <div class="chat-footer">
                <input type="text" id="msg-input" placeholder="Type a message...">
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="call-screen">
            <div class="call-user-details">
                <div class="avatar" id="call-avatar" style="width:96px; height:96px; font-size:40px; margin: 0 auto;">C</div>
                <h2 id="call-username">User</h2>
                <div id="call-status" class="call-status">Ringing...</div>
            </div>

            <div class="video-container" id="video-container">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay playsinline muted></video>
            </div>

            <div class="call-controls">
                <button id="accept-call-btn" class="call-btn accept" onclick="acceptIncomingCall()"><i class="fa-solid fa-phone"></i></button>
                <button id="mute-call-btn" class="call-btn mute" onclick="toggleMute()"><i class="fa-solid fa-microphone"></i></button>
                <button id="decline-call-btn" class="call-btn decline" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>

        <div id="add-friend-modal" class="modal">
            <div class="modal-content">
                <h3>Add Friend</h3>
                <div class="form-group">
                    <label>Friend's Email Address</label>
                    <input type="email" id="friend-email-input" placeholder="enter email...">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal('add-friend-modal')">Cancel</button>
                    <button class="btn btn-primary" onclick="sendFriendRequest()">Send Request</button>
                </div>
            </div>
        </div>

        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <h3>Profile & Settings</h3>
                <p style="margin-bottom: 20px;" id="settings-profile-info">Logged in as: </p>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal('settings-modal')">Close</button>
                    <button class="btn btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>

    </div>

    <audio id="ringtone" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD"></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
  apiKey: "AIzaSyC_OhrGDgMsf2A1vTA39YpoRiyO7X7sKEE",
  authDomain: "chat-app-nishuu.firebaseapp.com",
  databaseURL: "https://chat-app-nishuu-default-rtdb.firebaseio.com",
  projectId: "chat-app-nishuu",
  storageBucket: "chat-app-nishuu.firebasestorage.app",
  messagingSenderId: "768213723632",
  appId: "1:768213723632:web:678b415d9c7f259d1c5535"
};
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- 2. STATE MANAGEMENT ---
        let currentUser = null;
        let activeChatFriendId = null;
        let activeRoomId = null;
        
        // WebRTC Infrastructure Variables
        let localStream = null;
        let peerConnection = null;
        let currentCallRef = null; 
        let callType = null; // 'voice' or 'video'
        let isMuted = false;

        const rtcConfig = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };

        // --- 3. AUTHENTICATION CONTROLLERS ---
        function toggleAuthForms(showSignup) {
            document.getElementById('login-card').style.display = showSignup ? 'none' : 'block';
            document.getElementById('signup-card').style.display = showSignup ? 'block' : 'none';
        }

        function handleAuth(event, type) {
            event.preventDefault();
            const logErr = document.getElementById('login-error');
            const sigErr = document.getElementById('signup-error');
            logErr.style.display = 'none'; sigErr.style.display = 'none';

            if (type === 'signup') {
                const name = document.getElementById('signup-name').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;

                auth.createUserWithEmailAndPassword(email, password)
                    .then(cred => {
                        return db.ref('users/' + cred.user.uid).set({
                            uid: cred.user.uid,
                            name: name,
                            email: email.toLowerCase()
                        });
                    })
                    .catch(err => { sigErr.innerText = err.message; sigErr.style.display = 'block'; });
            } else {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                auth.signInWithEmailAndPassword(email, password)
                    .catch(err => { logErr.innerText = err.message; logErr.style.display = 'block'; });
            }
        }

        function logout() {
            auth.signOut().then(() => {
                closeModal('settings-modal');
                location.reload();
            });
        }

        // Auth Observer
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.add('active');
                
                db.ref('users/' + user.uid).once('value').then(snap => {
                    if (snap.exists()) {
                        document.getElementById('settings-profile-info').innerText = `Logged in as: ${snap.val().name} (${snap.val().email})`;
                    }
                });
                
                initializeDataListeners();
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.remove('active');
            }
        });

        // --- 4. NAVIGATION & MODALS ---
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active-panel'));
            
            if (tabName === 'home') {
                document.getElementById('nav-home').classList.add('active-tab');
                document.getElementById('home-content').classList.add('active-panel');
            } else if (tabName === 'notifications') {
                document.getElementById('nav-notifications').classList.add('active-tab');
                document.getElementById('notifications-content').classList.add('active-panel');
            } else if (tabName === 'calls') {
                document.getElementById('nav-calls').classList.add('active-tab');
                document.getElementById('calls-content').classList.add('active-panel');
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- 5. SOCIAL / FRIENDS SYSTEM ---
        function sendFriendRequest() {
            const emailInput = document.getElementById('friend-email-input').value.trim().toLowerCase();
            if (!emailInput || emailInput === currentUser.email) return alert("Invalid Target Email.");

            db.ref('users').orderByChild('email').equalTo(emailInput).once('value', snap => {
                if (!snap.exists()) return alert("User not found.");
                
                const targetUid = Object.keys(snap.val())[0];
                const targetUser = snap.val()[targetUid];

                db.ref(`friends/${currentUser.uid}/${targetUid}`).once('value', frSnap => {
                    if(frSnap.exists()) return alert("Already connected or requested.");

                    // Request Pipeline Insertion
                    db.ref(`requests/${targetUid}/${currentUser.uid}`).set({
                        fromUid: currentUser.uid,
                        fromEmail: currentUser.email,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        alert("Friend Request Transmitted!");
                        closeModal('add-friend-modal');
                        document.getElementById('friend-email-input').value = "";
                    });
                });
            });
        }

        function acceptFriendRequest(senderUid) {
            db.ref(`users/${senderUid}`).once('value', snap => {
                const sender = snap.val();
                const updates = {};
                
                // Establish bidirectional bonds
                updates[`friends/${currentUser.uid}/${senderUid}`] = { uid: senderUid, name: sender.name, room: [currentUser.uid, senderUid].sort().join("_") };
                
                db.ref(`users/${currentUser.uid}`).once('value', meSnap => {
                    updates[`friends/${senderUid}/${currentUser.uid}`] = { uid: currentUser.uid, name: meSnap.val().name, room: [currentUser.uid, senderUid].sort().join("_") };
                    updates[`requests/${currentUser.uid}/${senderUid}`] = null; // Clean up request

                    db.ref().update(updates);
                });
            });
        }

        // --- 6. CORE APP SYNCHRONIZER LISTENERS ---
        function initializeDataListeners() {
            // Watch incoming requests
            db.ref(`requests/${currentUser.uid}`).on('value', snap => {
                const container = document.getElementById('notifications-content');
                container.innerHTML = "";
                let count = 0;
                
                if (snap.exists()) {
                    snap.forEach(child => {
                        count++;
                        const req = child.val();
                        container.innerHTML += `
                            <div class="list-item">
                                <div class="avatar"><i class="fa-solid fa-user-clock"></i></div>
                                <div class="item-details">
                                    <div class="item-name">${req.fromEmail}</div>
                                    <div class="item-subtext">Wants to add you</div>
                                </div>
                                <button class="btn btn-primary" onclick="acceptFriendRequest('${req.fromUid}')">Accept</button>
                            </div>`;
                    });
                } else {
                    container.innerHTML = `<p style="padding:20px; text-align:center; color:gray;">No new notification updates.</p>`;
                }
                document.getElementById('notif-badge').innerText = count;
                document.getElementById('notif-badge').style.display = count > 0 ? 'block' : 'none';
            });

            // Watch Friends List / Render Chats Hub
            db.ref(`friends/${currentUser.uid}`).on('value', snap => {
                const container = document.getElementById('home-content');
                container.innerHTML = "";
                
                if (snap.exists()) {
                    snap.forEach(child => {
                        const fr = child.val();
                        container.innerHTML += `
                            <div class="list-item" onclick="openChat('${fr.uid}', '${fr.name}', '${fr.room}')">
                                <div class="avatar">${fr.name[0].toUpperCase()}</div>
                                <div class="item-details">
                                    <div class="item-row">
                                        <div class="item-name">${fr.name}</div>
                                    </div>
                                    <div class="item-subtext">Click to start chatting</div>
                                </div>
                            </div>`;
                    });
                } else {
                    container.innerHTML = `<p style="padding:20px; text-align:center; color:gray;">Add friends to start chatting!</p>`;
                }
            });

            // Watch Inbound Call Node Pipeline
            db.ref(`calls/${currentUser.uid}`).on('value', snap => {
                if (snap.exists()) {
                    const trackingData = snap.val();
                    if (trackingData.status === 'dialing' && !currentCallRef) {
                        displayInboundCallScreen(trackingData);
                    } else if (trackingData.status === 'disconnected') {
                        terminateActiveCallPipeline();
                    }
                }
            });

            // Watch Calls History Node Pipeline
            db.ref(`callHistory/${currentUser.uid}`).on('value', snap => {
                const container = document.getElementById('calls-content');
                container.innerHTML = "";
                let count = 0;
                if(snap.exists()) {
                    let logs = [];
                    snap.forEach(c => { logs.unshift(c.val()); }); // Newest logs first
                    logs.forEach(log => {
                        count++;
                        const icon = log.type === 'video' ? 'fa-video' : 'fa-phone';
                        container.innerHTML += `
                            <div class="list-item">
                                <div class="avatar"><i class="fa-solid ${icon}"></i></div>
                                <div class="item-details">
                                    <div class="item-name">${log.peerName}</div>
                                    <div class="item-subtext">${log.direction} Call - ${new Date(log.timestamp).toLocaleTimeString()}</div>
                                </div>
                            </div>`;
                    });
                } else {
                    container.innerHTML = `<p style="padding:20px; text-align:center; color:gray;">No calls logged.</p>`;
                }
            });
        }

        // --- 7. REAL-TIME CHAT ACTIONS ---
        function openChat(frUid, name, room) {
            activeChatFriendId = frUid;
            activeRoomId = room;
            
            document.getElementById('chat-screen-title').innerText = name;
            document.getElementById('chat-avatar').innerText = name[0].toUpperCase();
            document.getElementById('chat-view').classList.add('active');

            // Synchronize Messages
            db.ref(`messages/${activeRoomId}`).off(); // Kill previous iterations
            db.ref(`messages/${activeRoomId}`).on('value', snap => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                if(snap.exists()) {
                    snap.forEach(child => {
                        const m = child.val();
                        const cls = m.senderId === currentUser.uid ? 'sent' : 'received';
                        const timeStr = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        container.innerHTML += `<div class="message ${cls}">${m.text}<span class="msg-time">${timeStr}</span></div>`;
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        }

        function closeChat() {
            document.getElementById('chat-view').classList.remove('active');
            db.ref(`messages/${activeRoomId}`).off();
            activeChatFriendId = null;
            activeRoomId = null;
        }

        function sendMessage() {
            const inp = document.getElementById('msg-input');
            const txt = inp.value.trim();
            if (!txt || !activeRoomId) return;

            db.ref(`messages/${activeRoomId}`).push({
                senderId: currentUser.uid,
                text: txt,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            inp.value = "";
        }

        // --- 8. WEBRTC ENGINE & ENGINE-CALLS MANAGEMENT ---
        function initiateCall(type) {
            if (!activeChatFriendId) return;
            callType = type;
            
            document.getElementById('call-username').innerText = document.getElementById('chat-screen-title').innerText;
            document.getElementById('call-avatar').innerText = document.getElementById('chat-avatar').innerText;
            document.getElementById('call-status').innerText = "Calling...";
            
            // UI visibility config adjustments
            document.getElementById('accept-call-btn').style.display = 'none';
            document.getElementById('video-container').style.display = callType === 'video' ? 'block' : 'none';
            document.getElementById('call-screen').style.display = 'flex';
            
            // Map Call Session Metadata Registry Node pointers
            currentCallRef = db.ref(`calls/${activeChatFriendId}`);
            
            db.ref(`users/${currentUser.uid}`).once('value').then(snap => {
                const myName = snap.val().name;
                
                // Write active dynamic session topology
                return currentCallRef.set({
                    callerId: currentUser.uid,
                    callerName: myName,
                    type: callType,
                    status: 'dialing',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }).then(() => {
                logCallHistory(currentUser.uid, document.getElementById('chat-screen-title').innerText, callType, 'Outgoing');
                startRingtone(true);
                setupCallInterceptors();
            });
        }

        function displayInboundCallScreen(callData) {
            callType = callData.type;
            currentCallRef = db.ref(`calls/${currentUser.uid}`);
            activeChatFriendId = callData.callerId;

            document.getElementById('call-username').innerText = callData.callerName;
            document.getElementById('call-avatar').innerText = callData.callerName[0].toUpperCase();
            document.getElementById('call-status').innerText = `Incoming ${callType} call...`;
            
            document.getElementById('accept-call-btn').style.display = 'inline-flex';
            document.getElementById('video-container').style.display = 'none'; // Hidden until answered
            document.getElementById('call-screen').style.display = 'flex';
            
            startRingtone(true);
            logCallHistory(currentUser.uid, callData.callerName, callType, 'Incoming');
            setupCallInterceptors();
        }

        function setupCallInterceptors() {
            // Track mutations live inside parameters mapping configuration setup
            currentCallRef.on('value', snap => {
                if (!snap.exists()) {
                    terminateActiveCallPipeline();
                    return;
                }
                const data = snap.val();
                if (data.status === 'accepted' && peerConnection === null) {
                    startPeerConnectionNegotiation(false);
                }
                if (data.status === 'disconnected') {
                    terminateActiveCallPipeline();
                }
            });

            // Watch Signal Stream nodes explicitly (SDP & ICE)
            currentCallRef.child('signals').on('child_added', snap => {
                const signal = snap.val();
                if (signal.sender === currentUser.uid) return; // Prevent echoing self loops

                if (signal.sdp) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp))
                        .then(() => {
                            if (peerConnection.remoteDescription.type === 'offer') {
                                peerConnection.createAnswer().then(answer => {
                                    peerConnection.setLocalDescription(answer);
                                    currentCallRef.child('signals').push({ sdp: answer, sender: currentUser.uid });
                                });
                            }
                        });
                } else if (signal.ice) {
                    if (peerConnection) {
                        peerConnection.addIceCandidate(new RTCIceCandidate(signal.ice));
                    }
                }
            });
        }

        function acceptIncomingCall() {
            document.getElementById('accept-call-btn').style.display = 'none';
            document.getElementById('call-status').innerText = "Connecting...";
            startRingtone(false);

            currentCallRef.update({ status: 'accepted' }).then(() => {
                if (callType === 'video') {
                    document.getElementById('video-container').style.display = 'block';
                }
                startPeerConnectionNegotiation(true);
            });
        }

        function startPeerConnectionNegotiation(isAnswering) {
            document.getElementById('call-status').innerText = "Active Session";
            startRingtone(false);

            const constraints = {
                audio: true,
                video: callType === 'video'
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    localStream = stream;
                    document.getElementById('local-video').srcObject = stream;

                    peerConnection = new RTCPeerConnection(rtcConfig);
                    
                    // Route outbound local tracks directly into our dynamic WebRTC session topology
                    stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                    // Route Inbound Remote Media Tracks inside View Element Layer
                    peerConnection.ontrack = event => {
                        document.getElementById('remote-video').srcObject = event.streams[0];
                    };

                    // Broadcast Network candidates globally across shared RTC instances via Firebase signaling pipeline
                    peerConnection.onicecandidate = event => {
                        if (event.candidate) {
                            currentCallRef.child('signals').push({ ice: event.candidate.toJSON(), sender: currentUser.uid });
                        }
                    };

                    if (!isAnswering) {
                        // Caller initiates transaction sequence maps
                        peerConnection.createOffer().then(offer => {
                            peerConnection.setLocalDescription(offer);
                            currentCallRef.child('signals').push({ sdp: offer, sender: currentUser.uid });
                        });
                    }
                })
                .catch(err => {
                    console.error("Device media error capture stream dropped: ", err);
                    alert("Unable to access local camera/microphone devices.");
                    endCall();
                });
        }

        function toggleMute() {
            if (localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks()[0].enabled = !isMuted;
                document.getElementById('mute-call-btn').style.backgroundColor = isMuted ? '#ea0038' : '#555';
            }
        }

        function endCall() {
            if (currentCallRef) {
                currentCallRef.update({ status: 'disconnected' }).then(() => {
                    terminateActiveCallPipeline();
                });
            } else {
                terminateActiveCallPipeline();
            }
        }

        function terminateActiveCallPipeline() {
            startRingtone(false);
            
            if (currentCallRef) {
                currentCallRef.off();
                currentCallRef.remove();
                currentCallRef = null;
            }

            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
            document.getElementById('call-screen').style.display = 'none';
            
            // Clean interface configurations parameters reset values
            isMuted = false;
            document.getElementById('mute-call-btn').style.backgroundColor = '#555';
            activeChatFriendId = null;
        }

        function startRingtone(status) {
            const rt = document.getElementById('ringtone');
            if(status) {
                rt.play().catch(() => { /* Handle modern browser gesture autoplay barriers smoothly */ });
            } else {
                rt.pause();
                rt.currentTime = 0;
            }
        }

        function logCallHistory(uid, peerName, type, direction) {
            db.ref(`callHistory/${uid}`).push({
                peerName: peerName,
                type: type,
                direction: direction,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }
    </script>
